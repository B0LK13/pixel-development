name: tests

# Runs the repo's own verification gate (tests/run_tests.sh) — the same
# command the autodev runner reads from .pixel-lab.json. Local tests only:
# no agents, no secrets, no pushes, no repository mutation.
on:
  push:
    branches: [main, 'auto/*']
  pull_request:

# least privilege: the suite only reads the checked-out tree
permissions:
  contents: read

# one run per ref at a time; a new push cancels the stale one
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Whitespace / conflict-marker gate
        run: git diff --check
      - name: Checksum manifest lockstep gate
        run: bash scripts/update-bootstrap-checksums.sh --check
      - name: Run verification suite
        run: bash tests/run_tests.sh

  # Validates release-candidate mechanics with throwaway fixtures only:
  # version 0.0.0 is reserved for CI, the signing key is generated per run,
  # nothing is tagged, signed with a real identity, published, or pushed.
  release-candidate-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Build fixture release candidate
        run: SOURCE_DATE_EPOCH=0 bash scripts/build-release-candidate.sh --version=0.0.0 --output-dir="$RUNNER_TEMP/rc"
      - name: Verify unsigned bundle (integrity-only)
        run: |
          bash scripts/verify-release-bundle.sh --bundle="$RUNNER_TEMP/rc/pixel-development-0.0.0" | tee "$RUNNER_TEMP/unsigned.txt"
          grep -q "verdict: verified-integrity-only" "$RUNNER_TEMP/unsigned.txt"
      - name: Reproducibility check (second build, same epoch)
        run: |
          SOURCE_DATE_EPOCH=0 bash scripts/build-release-candidate.sh --version=0.0.0 --output-dir="$RUNNER_TEMP/rc2"
          diff -r "$RUNNER_TEMP/rc/pixel-development-0.0.0" "$RUNNER_TEMP/rc2/pixel-development-0.0.0"
      - name: Sign with a throwaway CI fixture key, verify signed
        run: |
          set -e
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
          printf 'Key-Type: eddsa\nKey-Curve: ed25519\nKey-Usage: sign\nName-Real: CI Fixture\nName-Email: ci@example.invalid\n%%no-protection\n%%commit\n' > "$RUNNER_TEMP/keyparams"
          gpg --batch --gen-key "$RUNNER_TEMP/keyparams"
          gpg --export ci@example.invalid > "$RUNNER_TEMP/ci-fixture.pub"
          B="$RUNNER_TEMP/rc/pixel-development-0.0.0"
          gpg --batch --yes --local-user ci@example.invalid --detach-sign --armor \
            --output "$B/SIGNING-MANIFEST.json.asc" "$B/SIGNING-MANIFEST.json"
          bash scripts/verify-release-bundle.sh --bundle="$B" \
            --signature="$B/SIGNING-MANIFEST.json.asc" \
            --keyring="$RUNNER_TEMP/ci-fixture.pub" --require-signature | tee "$RUNNER_TEMP/signed.txt"
          grep -q "verdict: verified-signed" "$RUNNER_TEMP/signed.txt"
